<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Plan Fitness</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F4F2EE;
  --surf:#FFFFFF;
  --surf2:#F9F8F6;
  --border:rgba(0,0,0,0.08);
  --border2:rgba(0,0,0,0.13);
  --text:#1A1918;
  --text2:#6B6560;
  --text3:#A09A95;
  --accent:#8B67E0;
  --accent-bg:#F0ECFF;
  --accent-t:#5C3DB8;
  --green:#2D9B75;
  --green-bg:#E5F7F1;
  --green-t:#1A6B50;
  --coral:#C95038;
  --coral-bg:#FAEDE9;
  --coral-t:#8A3325;
  --pink:#C05280;
  --pink-bg:#FCEAF3;
  --pink-t:#7D2F52;
  --amber:#B8761E;
  --amber-bg:#FDF3E3;
  --amber-t:#7A4D0E;
  --blue:#3A78BF;
  --blue-bg:#ECF4FF;
  --blue-t:#1E4F85;
  --nav:64px;
  --head:58px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5}

/* LAYOUT */
.app{height:100vh;display:flex;flex-direction:column}
.content{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:calc(var(--nav) + 8px)}
.page{display:none}
.page.active{display:block}

/* HEADER */
.page-header{background:var(--surf);padding:14px 16px 12px;border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:20}
.page-header h1{font-size:19px;font-weight:600;letter-spacing:-0.3px}
.page-header p{font-size:13px;color:var(--text2);margin-top:2px}

/* BOTTOM NAV */
.bottom-nav{background:var(--surf);border-top:0.5px solid var(--border);display:flex;height:var(--nav);flex-shrink:0;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:transparent;cursor:pointer;color:var(--text3);padding:6px 0;font-family:'DM Sans',sans-serif}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:22px;height:22px;stroke-width:1.6}
.nav-btn span{font-size:11px;font-weight:500}

/* ─────────────────────────────── CRONOGRAMA ── */
.sched-tabs{display:flex;gap:6px;padding:14px 16px 10px;overflow-x:auto;scrollbar-width:none}
.sched-tabs::-webkit-scrollbar{display:none}
.sched-tab{flex-shrink:0;padding:7px 14px;border-radius:99px;font-size:13px;font-weight:500;border:1px solid var(--border2);background:var(--surf);cursor:pointer;color:var(--text2);font-family:'DM Sans',sans-serif}
.sched-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.sched-body{padding:0 16px 16px}
.day-type-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:99px;font-size:12px;font-weight:500;margin-bottom:10px}
.sched-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.meta-chip{font-size:12px;padding:4px 10px;border-radius:99px;background:var(--surf2);border:0.5px solid var(--border2);color:var(--text2)}
.meal-card{background:var(--surf);border-radius:12px;border:0.5px solid var(--border);margin-bottom:8px;overflow:hidden}
.meal-top{display:grid;grid-template-columns:52px 1fr 48px;gap:8px;padding:11px 13px;align-items:center}
.meal-time{font-size:12px;color:var(--text3);font-weight:500}
.meal-name{font-size:13px;font-weight:500;line-height:1.35}
.meal-kcal{font-size:12px;color:var(--text2);text-align:right}
.meal-macros{display:grid;grid-template-columns:repeat(3,1fr);border-top:0.5px solid var(--border);background:var(--surf2)}
.mc{padding:8px 4px;text-align:center}
.mc-v{font-size:13px;font-weight:600}
.mc-v.p{color:var(--blue-t)}
.mc-v.c{color:var(--green-t)}
.mc-v.f{color:var(--amber-t)}
.mc-l{font-size:10px;color:var(--text3);margin-top:1px}
.totals{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px}
.tot{background:var(--surf);border-radius:10px;padding:10px 4px;text-align:center;border:0.5px solid var(--border)}
.tot-v{font-size:16px;font-weight:600}
.tot-v.p{color:var(--blue-t)}
.tot-v.c{color:var(--green-t)}
.tot-v.f{color:var(--amber-t)}
.tot-l{font-size:10px;color:var(--text3);margin-top:2px}

/* ─────────────────────────────── RUTINA ── */
.routine-daytabs{display:grid;grid-template-columns:repeat(4,1fr);margin:14px 16px 14px;border-radius:12px;overflow:hidden;border:0.5px solid var(--border)}
.rdt{padding:10px 2px;text-align:center;cursor:pointer;border:none;background:var(--surf);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;color:var(--text2);border-right:0.5px solid var(--border);line-height:1.4}
.rdt:last-child{border-right:none}
.rdt.active{background:var(--accent);color:#fff}
.routine-body{padding:0 16px 16px}
.r-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.r-meta-chip{font-size:12px;padding:4px 10px;border-radius:99px;background:var(--surf2);border:0.5px solid var(--border2);color:var(--text2)}
.muscle-block{border-radius:12px;overflow:hidden;border:0.5px solid var(--border);margin-bottom:10px}
.m-head{display:flex;align-items:center;gap:8px;padding:10px 13px;background:var(--surf)}
.m-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.m-name{font-size:13px;font-weight:600}
.m-emph{font-size:10px;padding:2px 8px;border-radius:99px;margin-left:auto;font-weight:500}
.ex-item{border-top:0.5px solid var(--border)}
.ex-row{display:flex;align-items:center;gap:10px;padding:12px 13px;cursor:pointer;background:var(--surf)}
.ex-name{flex:1;font-size:13px;line-height:1.35;font-weight:400}
.ex-chips{display:flex;flex-direction:column;gap:3px;align-items:flex-end;flex-shrink:0}
.chip-fallo{font-size:10px;padding:2px 7px;border-radius:4px;background:#FFE9E8;color:#B52B1E;font-weight:500;white-space:nowrap}
.chip-aprox{font-size:10px;padding:2px 7px;border-radius:4px;background:var(--surf2);color:var(--text3);font-weight:500;white-space:nowrap}
.ex-arrow{font-size:12px;color:var(--text3);flex-shrink:0;transition:transform .25s;margin-left:4px}
.ex-arrow.open{transform:rotate(180deg)}
.video-section{display:none;background:var(--surf2);border-top:0.5px solid var(--border);padding:12px 13px}
.video-section.open{display:block}
.vid-thumb-wrap{position:relative;width:100%;border-radius:10px;overflow:hidden;background:#111;cursor:pointer}
.vid-thumb-wrap img{width:100%;display:block;border-radius:10px}
.vid-play-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:52px;height:52px;background:rgba(0,0,0,0.72);border-radius:50%;display:flex;align-items:center;justify-content:center;pointer-events:none}
.vid-play-btn svg{width:22px;height:22px;fill:#fff;margin-left:3px}
.vid-label{font-size:12px;color:var(--text3);margin-bottom:8px;font-weight:500}
.vid-open-btn{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:10px;padding:10px;background:var(--accent-bg);color:var(--accent-t);border-radius:10px;font-size:13px;font-weight:500;text-decoration:none;border:0.5px solid rgba(139,103,224,0.25)}

/* ─────────────────────────────── NOTAS ── */
.notes-body{padding:14px 16px}
.notes-cat{margin-bottom:20px}
.notes-cat-head{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:600;margin-bottom:10px;letter-spacing:-0.2px}
.note-card{background:var(--surf);border-radius:10px;border:0.5px solid var(--border);padding:13px 14px;margin-bottom:7px;font-size:14px;line-height:1.65;color:var(--text2)}
.note-card b{color:var(--text);font-weight:600}
.note-num{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;font-size:11px;font-weight:600;flex-shrink:0;background:var(--accent-bg);color:var(--accent-t);margin-right:6px}

/* ─── utils ── */
.bi{background:var(--blue-bg);color:var(--blue-t)}
.gi{background:var(--green-bg);color:var(--green-t)}
.oi{background:var(--amber-bg);color:var(--amber-t)}
.ri{background:#FFE9E8;color:#8A2012}
</style>
</head>

<div class="app">
  <div class="content" id="content">

    <!-- ══════════ CRONOGRAMA ══════════ -->
    <div class="page active" id="page-sched">

        <h1>Cronograma Semanal</h1>

      <span>Notas</span>
    </button>
  </nav>
</div>

<script>
/* ══════════════════ PAGE NAVIGATION ══════════════════ */
function showPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  btn.classList.add('active');
  document.getElementById('content').scrollTop=0;
}

/* ══════════════════ SCHEDULE DATA ══════════════════ */

const TYPE_STYLE={
  upper:{cls:'bi',txt:'Upper body · pesas'},
  lower:{cls:'gi',txt:'Lower body · pesas'},
  cardio:{cls:'oi',txt:'Cardio Zona 2'},
  rest:{cls:'',bg:'#F4F2EE',color:'#6B6560',txt:'Descanso activo'}
};

let curSched=0;

function buildSchedule(){
  const tabs=document.getElementById('sched-tabs');
  DAYS_S.forEach((d,i)=>{
    const b=document.createElement('button');
    b.className='sched-tab'+(i===0?' active':'');
    b.textContent=d.d;
    b.onclick=()=>{
      curSched=i;
      tabs.querySelectorAll('.sched-tab').forEach((t,j)=>t.className='sched-tab'+(j===i?' active':''));
      renderSched();
    };
    tabs.appendChild(b);
  });
  renderSched();
}

function renderSched(){
  const d=DAYS_S[curSched];
  const ts=TYPE_STYLE[d.type];
  const tp=d.meals.reduce((a,m)=>a+m.p,0);
  const tc=d.meals.reduce((a,m)=>a+m.c,0);
  const tf=d.meals.reduce((a,m)=>a+m.f,0);
  let h=`<span class="day-type-badge ${ts.cls||''}" style="${d.type==='rest'?'background:#F4F2EE;color:#6B6560':''}">${ts.txt}</span>`;
  h+=`<div class="sched-meta">`;
  d.info.forEach(i=>h+=`<span class="meta-chip">${i}</span>`);
  h+=`</div>`;
  d.meals.forEach(m=>{
    const k=m.p*4+m.c*4+m.f*9;
    h+=`<div class="meal-card">
      <div class="meal-top">
        <div class="meal-time">${m.t}</div>
        <div class="meal-name">${m.n}</div>
        <div class="meal-kcal">${k} kcal</div>
      </div>
      <div class="meal-macros">
        <div class="mc"><div class="mc-v p">${m.p}g</div><div class="mc-l">Proteína</div></div>
        <div class="mc"><div class="mc-v c">${m.c}g</div><div class="mc-l">Carbos</div></div>
        <div class="mc"><div class="mc-v f">${m.f}g</div><div class="mc-l">Grasas</div></div>
      </div>
    </div>`;
  });
  h+=`<div class="totals">
    <div class="tot"><div class="tot-v p">${tp}g</div><div class="tot-l">Proteína</div></div>
    <div class="tot"><div class="tot-v c">${tc}g</div><div class="tot-l">Carbos</div></div>
    <div class="tot"><div class="tot-v f">${tf}g</div><div class="tot-l">Grasas</div></div>
    <div class="tot"><div class="tot-v">${d.kcal}</div><div class="tot-l">kcal total</div></div>
  </div>`;
  document.getElementById('sched-body').innerHTML=h;
}

let curDay=0;
let openVideos={};

function buildRoutine(){
  const tabs=document.getElementById('rdt');
  ROUTINE.forEach((d,i)=>{
    const b=document.createElement('button');
    b.className='rdt'+(i===0?' active':'');
    b.innerHTML=`<div style="font-weight:600">${d.name}</div><div style="font-size:10px;opacity:.75;margin-top:1px">${d.sub.split('·')[0].trim()}</div>`;
    b.onclick=()=>{
      curDay=i;
      openVideos={};
      tabs.querySelectorAll('.rdt').forEach((t,j)=>t.className='rdt'+(j===i?' active':''));
      renderRoutine();
    };
    tabs.appendChild(b);
  });
  renderRoutine();
}

function renderRoutine(){
  const d=ROUTINE[curDay];
  let h=`<div class="r-meta">`;
  d.meta.forEach(m=>h+=`<span class="r-meta-chip">${m}</span>`);
  h+=`</div>`;

  d.muscles.forEach((m,mi)=>{
    const emphTag=m.emphasis
      ? `<span class="m-emph" style="background:${m.ebg};color:${m.ect}">énfasis</span>`:'';
    h+=`<div class="muscle-block">
      <div class="m-head">
        <div class="m-dot" style="background:${m.dot}"></div>
        <span class="m-name">${m.label}</span>
        ${emphTag}
      </div>`;
    m.exs.forEach((e,ei)=>{
      const key=`${mi}-${ei}`;
      const isOpen=openVideos[key];
      const arrowCls=isOpen?'ex-arrow open':'ex-arrow';
      let chips='';
      if(e.aprox>0) chips+=`<span class="chip-aprox">${e.aprox} aprox</span>`;
      chips+=`<span class="chip-fallo">${e.fallo} al fallo</span>`;
      h+=`<div class="ex-item">
        <div class="ex-row" onclick="toggleVideo('${key}','${e.vid}')">
          <div class="ex-name">${e.n}</div>
          <div class="ex-chips">${chips}</div>
          <div class="${arrowCls}" id="arr-${key}">▼</div>
        </div>
        <div class="video-section ${isOpen?'open':''}" id="vs-${key}">
          <div class="vid-label">Video de demostración</div>
          <a href="https://www.youtube.com/watch?v=${e.vid}" target="_blank" class="vid-thumb-wrap">
            <img src="https://img.youtube.com/vi/${e.vid}/hqdefault.jpg" alt="${e.n}" loading="lazy">
            <div class="vid-play-btn"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></div>
          </a>
          <a href="https://www.youtube.com/watch?v=${e.vid}" target="_blank" class="vid-open-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22.54 6.42a2.78 2.78 0 00-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 001.46 6.42 29 29 0 001 12a29 29 0 00.46 5.58 2.78 2.78 0 001.95 1.96C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 001.95-1.96A29 29 0 0023 12a29 29 0 00-.46-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="currentColor" stroke="none"/></svg>
            Ver en YouTube
          </a>
        </div>
      </div>`;
    });
    h+=`</div>`;
  });
  document.getElementById('routine-body').innerHTML=h;
}

function toggleVideo(key,vid){
  const isOpen=openVideos[key];
  const vs=document.getElementById('vs-'+key);
  const arr=document.getElementById('arr-'+key);
  if(isOpen){
    openVideos[key]=false;
    vs.classList.remove('open');
    arr.classList.remove('open');
  } else {
    openVideos[key]=true;
    vs.classList.add('open');
    arr.classList.add('open');
  }
}
